# Stargazer — Helix Editor Theme
# Deep space midnight base · Galactic spectrum · Gold keyword anchors

# ─── Syntax Highlighting ─────────────────────────────────────────────────────

# Attributes
attribute = { fg = "violet", modifiers = ["italic"] }

# Types — Star Field Blue
type = { fg = "sky" }
"type.builtin" = { fg = "sky" }
"type.parameter" = { fg = "sky", modifiers = ["italic"] }
"type.enum" = { fg = "sky" }
"type.enum.variant" = { fg = "sky" }

# Constructor — Teal (type-adjacent)
constructor = { fg = "teal" }

# Constants — White Star
constant = { fg = "white_star" }
"constant.builtin" = { fg = "white_star" }
"constant.builtin.boolean" = { fg = "white_star" }
"constant.character" = { fg = "white_star" }
"constant.character.escape" = { fg = "cyan" }
"constant.numeric" = { fg = "amber" }
"constant.numeric.integer" = { fg = "amber" }
"constant.numeric.float" = { fg = "amber" }

# Strings — Aurora Green
string = { fg = "green" }
"string.regexp" = { fg = "cyan" }
"string.special" = { fg = "green" }
"string.special.path" = { fg = "green" }
"string.special.url" = { fg = "green", underline = { style = "line" } }
"string.special.symbol" = { fg = "gold" }

# Comments — Dark Matter
comment = { fg = "muted", modifiers = ["italic"] }
"comment.line.documentation" = { fg = "muted", modifiers = ["italic"] }
"comment.block.documentation" = { fg = "muted", modifiers = ["italic"] }
"comment.unused" = { fg = "gutter_fg", modifiers = ["italic"] }

# Variables — Moonlight
variable = { fg = "fg_primary" }
"variable.builtin" = { fg = "fg_primary", modifiers = ["italic"] }
"variable.parameter" = { fg = "fg_primary", modifiers = ["italic"] }
"variable.other" = { fg = "fg_primary" }
"variable.other.member" = { fg = "sky" }
"variable.other.member.private" = { fg = "sky", modifiers = ["italic"] }

# Labels
label = { fg = "cyan" }

# Punctuation
punctuation = { fg = "dimmed" }
"punctuation.delimiter" = { fg = "dimmed" }
"punctuation.bracket" = { fg = "dimmed" }
"punctuation.special" = { fg = "cyan" }

# Keywords — Galactic Gold (bold)
keyword = { fg = "gold", modifiers = ["bold"] }
"keyword.control" = { fg = "gold", modifiers = ["bold"] }
"keyword.control.conditional" = { fg = "gold", modifiers = ["bold"] }
"keyword.control.repeat" = { fg = "gold", modifiers = ["bold"] }
"keyword.control.import" = { fg = "gold", modifiers = ["bold"] }
"keyword.control.return" = { fg = "gold", modifiers = ["bold", "italic"] }
"keyword.control.exception" = { fg = "gold", modifiers = ["bold"] }
"keyword.operator" = { fg = "gold", modifiers = ["bold"] }
"keyword.directive" = { fg = "gold", modifiers = ["bold"] }
"keyword.function" = { fg = "gold", modifiers = ["bold"] }
"keyword.storage.type" = { fg = "gold", modifiers = ["bold"] }
"keyword.storage.modifier" = { fg = "gold", modifiers = ["bold"] }

# Operators
operator = { fg = "dimmed" }

# Functions — Nebula Cyan (the hero)
function = { fg = "cyan" }
"function.builtin" = { fg = "cyan" }
"function.method" = { fg = "cyan" }
"function.method.private" = { fg = "cyan", modifiers = ["italic"] }
"function.macro" = { fg = "cyan" }
"function.special" = { fg = "cyan" }

# Tags — Blue (like types)
tag = { fg = "blue" }
"tag.builtin" = { fg = "blue" }

# Namespace
namespace = { fg = "teal", modifiers = ["italic"] }

# Special
special = { fg = "gold" }

# Markup
"markup.heading" = { fg = "white_star", modifiers = ["bold"] }
"markup.heading.marker" = { fg = "dimmed" }
"markup.heading.1" = { fg = "white_star", modifiers = ["bold"] }
"markup.heading.2" = { fg = "white_star", modifiers = ["bold"] }
"markup.heading.3" = { fg = "sky", modifiers = ["bold"] }
"markup.heading.4" = { fg = "sky" }
"markup.heading.5" = { fg = "cyan" }
"markup.heading.6" = { fg = "cyan" }
"markup.list" = { fg = "cyan" }
"markup.list.unnumbered" = { fg = "cyan" }
"markup.list.numbered" = { fg = "amber" }
"markup.list.checked" = { fg = "green" }
"markup.list.unchecked" = { fg = "dimmed" }
"markup.bold" = { modifiers = ["bold"] }
"markup.italic" = { modifiers = ["italic"] }
"markup.strikethrough" = { modifiers = ["crossed_out"] }
"markup.link" = { fg = "cyan" }
"markup.link.url" = { fg = "cyan", underline = { style = "line" } }
"markup.link.label" = { fg = "sky" }
"markup.link.text" = { fg = "green" }
"markup.quote" = { fg = "muted", modifiers = ["italic"] }
"markup.raw" = { fg = "green" }
"markup.raw.inline" = { fg = "green" }
"markup.raw.block" = { fg = "green" }

# Diff
"diff.plus" = "green"
"diff.plus.gutter" = "green"
"diff.minus" = "red"
"diff.minus.gutter" = "red"
"diff.delta" = "amber"
"diff.delta.gutter" = "amber"

# ─── Interface / UI ──────────────────────────────────────────────────────────

"ui.background" = { fg = "fg_primary", bg = "bg_primary" }
"ui.background.separator" = { fg = "border" }

# Cursor
"ui.cursor" = { modifiers = ["reversed"] }
"ui.cursor.normal" = { fg = "bg_primary", bg = "secondary_cursor" }
"ui.cursor.insert" = { fg = "bg_primary", bg = "fg_primary" }
"ui.cursor.select" = { fg = "bg_primary", bg = "amber" }
"ui.cursor.match" = { fg = "cyan", modifiers = ["bold"] }
"ui.cursor.primary" = { fg = "bg_primary", bg = "cyan" }
"ui.cursor.primary.normal" = { fg = "bg_primary", bg = "cyan" }
"ui.cursor.primary.insert" = { fg = "bg_primary", bg = "fg_primary" }
"ui.cursor.primary.select" = { fg = "bg_primary", bg = "amber" }

# Selection
"ui.selection" = { bg = "selection" }
"ui.selection.primary" = { bg = "selection" }

# Cursorline / Cursorcolumn
"ui.cursorline.primary" = { bg = "bg_highlight" }
"ui.cursorline.secondary" = { bg = "bg_primary" }
"ui.cursorcolumn.primary" = { bg = "bg_highlight" }
"ui.cursorcolumn.secondary" = { bg = "bg_primary" }

# Gutter & Line Numbers
"ui.gutter" = { fg = "gutter_fg" }
"ui.gutter.selected" = { fg = "dimmed", bg = "bg_highlight" }
"ui.linenr" = { fg = "gutter_fg" }
"ui.linenr.selected" = { fg = "dimmed" }

# Statusline
"ui.statusline" = { fg = "dimmed", bg = "bg_secondary" }
"ui.statusline.inactive" = { fg = "gutter_fg", bg = "bg_secondary" }
"ui.statusline.normal" = { fg = "bg_secondary", bg = "cyan", modifiers = ["bold"] }
"ui.statusline.insert" = { fg = "bg_secondary", bg = "green", modifiers = ["bold"] }
"ui.statusline.select" = { fg = "bg_secondary", bg = "amber", modifiers = ["bold"] }
"ui.statusline.separator" = { fg = "border" }

# Bufferline
"ui.bufferline" = { fg = "muted", bg = "bg_secondary" }
"ui.bufferline.active" = { fg = "bg_secondary", bg = "cyan", modifiers = ["bold"] }
"ui.bufferline.background" = { bg = "bg_secondary" }

# Popup & Menus
"ui.popup" = { fg = "fg_primary", bg = "bg_secondary" }
"ui.popup.info" = { fg = "fg_primary", bg = "bg_secondary" }
"ui.window" = { fg = "border" }
"ui.help" = { fg = "fg_primary", bg = "bg_secondary" }
"ui.menu" = { fg = "fg_primary", bg = "bg_secondary" }
"ui.menu.selected" = { fg = "bg_secondary", bg = "cyan", modifiers = ["bold"] }
"ui.menu.scroll" = { fg = "dimmed", bg = "border" }

# Picker
"ui.picker.header" = { fg = "dimmed", modifiers = ["bold"] }
"ui.picker.header.column" = { fg = "dimmed" }
"ui.picker.header.column.active" = { fg = "cyan", modifiers = ["bold"] }

# Text
"ui.text" = { fg = "fg_primary" }
"ui.text.focus" = { fg = "fg_primary", bg = "bg_highlight", modifiers = ["bold"] }
"ui.text.inactive" = { fg = "muted" }
"ui.text.info" = { fg = "dimmed" }
"ui.text.directory" = { fg = "sky" }

# Virtual elements
"ui.virtual" = { fg = "border" }
"ui.virtual.ruler" = { bg = "bg_highlight" }
"ui.virtual.whitespace" = { fg = "border" }
"ui.virtual.indent-guide" = { fg = "border" }
"ui.virtual.inlay-hint" = { fg = "gutter_fg", bg = "bg_secondary" }
"ui.virtual.inlay-hint.parameter" = { fg = "gutter_fg", modifiers = ["italic"] }
"ui.virtual.inlay-hint.type" = { fg = "gutter_fg", modifiers = ["italic"] }
"ui.virtual.wrap" = { fg = "gutter_fg" }
"ui.virtual.jump-label" = { fg = "amber", modifiers = ["bold"] }

# Highlight
"ui.highlight" = { bg = "bg_highlight" }
"ui.highlight.frameline" = { bg = "bg_highlight" }

# Debug
"ui.debug.breakpoint" = { fg = "red" }
"ui.debug.active" = { fg = "amber" }

# Snippet
tabstop = { modifiers = ["italic"], bg = "bg_highlight" }

# Diagnostics (gutter)
warning = "amber"
error = "red"
info = "blue"
hint = "cyan"

# Diagnostics (editing area)
diagnostic = { underline = { color = "amber", style = "curl" } }
"diagnostic.hint" = { underline = { color = "cyan", style = "curl" } }
"diagnostic.info" = { underline = { color = "blue", style = "curl" } }
"diagnostic.warning" = { underline = { color = "amber", style = "curl" } }
"diagnostic.error" = { underline = { color = "red", style = "curl" } }
"diagnostic.unnecessary" = { modifiers = ["dim"] }
"diagnostic.deprecated" = { modifiers = ["crossed_out"] }

# ─── Palette ─────────────────────────────────────────────────────────────────

[palette]

# Backgrounds
bg_primary   = "#090E1A"
bg_secondary = "#060A12"
bg_highlight = "#111B2E"
border       = "#1A2840"
selection    = "#1C3050"

# Foregrounds
fg_primary = "#D6E8F5"
dimmed     = "#8AAFC8"
muted      = "#4D6D88"
gutter_fg  = "#2A4058"

# Accents
cyan       = "#29D7E8"
teal       = "#0ABFCC"
blue       = "#4B9FE1"
sky        = "#7EC8E3"
gold       = "#F5C842"
amber      = "#E8922A"
white_star = "#EDF4FF"
violet     = "#7B8FD4"
red        = "#E85555"
green      = "#4DC98A"
rose       = "#C97BA8"

# Secondary cursor (for multi-cursor)
secondary_cursor = "#1A4A6A"
