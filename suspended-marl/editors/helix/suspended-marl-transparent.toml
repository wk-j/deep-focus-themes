# Suspended Marl (Transparent) — Helix Editor Theme
# Inherits the base theme, removes all backgrounds to show terminal wallpaper.

inherits = "suspended-marl"

# ─── UI Overrides (transparent) ──────────────────────────────────────────────

"ui.background" = { fg = "fg_primary" }
"ui.background.separator" = { fg = "border" }

# Cursor
"ui.cursor.normal" = { modifiers = ["reversed"] }
"ui.cursor.insert" = { fg = "bg_dark", bg = "fg_primary" }
"ui.cursor.select" = { fg = "bg_dark", bg = "cliff_rust" }
"ui.cursor.primary" = { fg = "bg_dark", bg = "cliff_rust" }
"ui.cursor.primary.normal" = { fg = "bg_dark", bg = "cliff_rust" }
"ui.cursor.primary.insert" = { fg = "bg_dark", bg = "fg_primary" }
"ui.cursor.primary.select" = { fg = "bg_dark", bg = "fog_cyan" }

# Selection — slightly more visible on unknown backgrounds
"ui.selection" = { bg = "selection" }
"ui.selection.primary" = { bg = "selection" }

# Cursorline
"ui.cursorline.primary" = { bg = "bg_highlight" }
"ui.cursorline.secondary" = {}
"ui.cursorcolumn.primary" = { bg = "selection" }
"ui.cursorcolumn.secondary" = {}

# Gutter & Line Numbers
"ui.gutter" = {}
"ui.gutter.selected" = {}
"ui.linenr" = { fg = "gutter_fg" }
"ui.linenr.selected" = { fg = "dimmed", modifiers = ["bold"] }

# Statusline — keep opaque for readability
"ui.statusline" = { fg = "dimmed", bg = "bg_dark" }
"ui.statusline.inactive" = { fg = "gutter_fg", bg = "bg_dark" }
"ui.statusline.normal" = { fg = "bg_dark", bg = "cliff_rust", modifiers = ["bold"] }
"ui.statusline.insert" = { fg = "bg_dark", bg = "grass_olive", modifiers = ["bold"] }
"ui.statusline.select" = { fg = "bg_dark", bg = "fog_cyan", modifiers = ["bold"] }

# Bufferline — keep opaque
"ui.bufferline" = { fg = "muted", bg = "bg_dark" }
"ui.bufferline.active" = { fg = "bg_dark", bg = "cliff_rust", modifiers = ["bold"] }
"ui.bufferline.background" = { bg = "bg_dark" }

# Popup & Menus — keep opaque so text is always readable
"ui.popup" = { fg = "fg_primary", bg = "bg_dark" }
"ui.popup.info" = { fg = "fg_primary", bg = "bg_dark" }
"ui.menu" = { fg = "fg_primary", bg = "bg_dark" }
"ui.menu.selected" = { fg = "bg_dark", bg = "cliff_rust", modifiers = ["bold"] }
"ui.menu.scroll" = { fg = "dimmed", bg = "border" }
"ui.help" = { fg = "fg_primary", bg = "bg_dark" }
"ui.window" = { fg = "border" }

# Virtual elements — no backgrounds
"ui.virtual.ruler" = { fg = "border" }
"ui.virtual.inlay-hint" = { fg = "gutter_fg" }
"ui.virtual.inlay-hint.parameter" = { fg = "gutter_fg", modifiers = ["italic"] }
"ui.virtual.inlay-hint.type" = { fg = "gutter_fg", modifiers = ["italic"] }

# Highlight
"ui.highlight" = { modifiers = ["bold"] }
"ui.highlight.frameline" = { underline = { color = "cliff_rust", style = "line" } }

# Snippet
tabstop = { modifiers = ["italic", "underlined"] }

# ─── Palette ─────────────────────────────────────────────────────────────────

[palette]

# Opaque dark for UI elements that must stay readable
bg_dark      = "#111417"
border       = "#2F363C"
selection    = "#2A3540"
bg_highlight = "#252B30"

# Foregrounds
fg_primary = "#C8D8DC"
dimmed     = "#8FA8B0"
muted      = "#607880"
gutter_fg  = "#3E5058"

# Accents
fog_cyan    = "#7DC4D4"
cliff_rust  = "#C47A5A"
grass_olive = "#8AAA60"
stone_mauve = "#9A8CB0"
sky_pale    = "#A8CDD8"
amber_dry   = "#C4A050"
water_teal  = "#4A9090"
figure_dim  = "#4A5060"
red         = "#C45860"

# Secondary cursor
secondary_cursor = "#2A3A40"
