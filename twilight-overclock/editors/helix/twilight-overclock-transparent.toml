# Twilight Overclock (Transparent) — Helix Editor Theme
# Inherits the base theme, removes all backgrounds to show terminal wallpaper.

inherits = "twilight-overclock"

# ─── UI Overrides (transparent) ──────────────────────────────────────────────

"ui.background" = { fg = "mist_white" }
"ui.background.separator" = { fg = "border" }

# Cursor
"ui.cursor.normal" = { modifiers = ["reversed"] }
"ui.cursor.insert" = { fg = "bg_dark", bg = "mist_white" }
"ui.cursor.select" = { fg = "bg_dark", bg = "honey_amber" }
"ui.cursor.primary" = { fg = "bg_dark", bg = "electric_cyan" }
"ui.cursor.primary.normal" = { fg = "bg_dark", bg = "electric_cyan" }
"ui.cursor.primary.insert" = { fg = "bg_dark", bg = "mist_white" }
"ui.cursor.primary.select" = { fg = "bg_dark", bg = "honey_amber" }

# Selection — slightly more visible on unknown backgrounds
"ui.selection" = { bg = "selection" }
"ui.selection.primary" = { bg = "selection" }

# Cursorline
"ui.cursorline.primary" = { bg = "bg_highlight" }
"ui.cursorline.secondary" = {}
"ui.cursorcolumn.primary" = { bg = "selection" }
"ui.cursorcolumn.secondary" = {}

# Gutter & Line Numbers
"ui.gutter" = {}
"ui.gutter.selected" = {}
"ui.linenr" = { fg = "gutter_fg" }
"ui.linenr.selected" = { fg = "slate_shadow", modifiers = ["bold"] }

# Statusline — keep opaque for readability
"ui.statusline" = { fg = "steel_grey", bg = "bg_dark" }
"ui.statusline.inactive" = { fg = "gutter_fg", bg = "bg_dark" }
"ui.statusline.normal" = { fg = "bg_dark", bg = "sage_moss", modifiers = ["bold"] }
"ui.statusline.insert" = { fg = "bg_dark", bg = "electric_cyan", modifiers = ["bold"] }
"ui.statusline.select" = { fg = "bg_dark", bg = "honey_amber", modifiers = ["bold"] }

# Bufferline — keep opaque
"ui.bufferline" = { fg = "slate_shadow", bg = "bg_dark" }
"ui.bufferline.active" = { fg = "mist_white", bg = "bg_dark", underline = { color = "electric_cyan", style = "line" } }
"ui.bufferline.background" = { bg = "bg_dark" }

# Popup & Menus — keep opaque so text is always readable
"ui.popup" = { fg = "mist_white", bg = "bg_dark" }
"ui.popup.info" = { fg = "mist_white", bg = "bg_dark" }
"ui.menu" = { fg = "mist_white", bg = "bg_dark" }
"ui.menu.selected" = { fg = "bg_dark", bg = "electric_cyan", modifiers = ["bold"] }
"ui.menu.scroll" = { fg = "steel_grey", bg = "border" }
"ui.help" = { fg = "mist_white", bg = "bg_dark" }
"ui.window" = { fg = "border" }

# Virtual elements — no backgrounds
"ui.virtual.ruler" = { fg = "border" }
"ui.virtual.inlay-hint" = { fg = "gutter_fg" }
"ui.virtual.inlay-hint.parameter" = { fg = "gutter_fg", modifiers = ["italic"] }
"ui.virtual.inlay-hint.type" = { fg = "gutter_fg", modifiers = ["italic"] }

# Highlight
"ui.highlight" = { modifiers = ["bold"] }
"ui.highlight.frameline" = { underline = { color = "honey_amber", style = "line" } }

# Snippet
tabstop = { modifiers = ["italic", "underlined"] }

# ─── Palette ─────────────────────────────────────────────────────────────────

[palette]

# Opaque dark for UI elements that must stay readable
bg_dark = "#070B0D"
border = "#1A2228"
selection = "#0A3A40"

# Foregrounds
mist_white = "#E0E0E0"
steel_grey = "#8899A6"
slate_shadow = "#4A5568"
gutter_fg = "#2D3748"

# Accents
electric_cyan = "#00F5FF"
sage_moss = "#7FB069"
honey_amber = "#FFB347"
glacier_blue = "#5B9BD5"
twilight_lavender = "#C195D4"
soft_coral = "#FF5F5F"

# Secondary cursor
secondary_cursor = "#5EAAB0"
