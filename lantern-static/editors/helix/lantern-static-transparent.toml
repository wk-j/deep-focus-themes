# Lantern Static (Transparent) — Helix Editor Theme
# Inherits the base theme, removes all backgrounds to show terminal wallpaper.

inherits = "lantern-static"

# ─── UI Overrides (transparent) ──────────────────────────────────────────────

"ui.background" = { fg = "dusty_white" }
"ui.background.separator" = { fg = "border" }

# Cursor
"ui.cursor.normal" = { modifiers = ["reversed"] }
"ui.cursor.insert" = { fg = "bg_dark", bg = "dusty_white" }
"ui.cursor.select" = { fg = "bg_dark", bg = "rust_glow" }
"ui.cursor.primary" = { fg = "bg_dark", bg = "plasma_blue" }
"ui.cursor.primary.normal" = { fg = "bg_dark", bg = "plasma_blue" }
"ui.cursor.primary.insert" = { fg = "bg_dark", bg = "dusty_white" }
"ui.cursor.primary.select" = { fg = "bg_dark", bg = "rust_glow" }

# Selection — slightly more visible on unknown backgrounds
"ui.selection" = { bg = "selection" }
"ui.selection.primary" = { bg = "selection" }

# Cursorline
"ui.cursorline.primary" = { bg = "bg_highlight" }
"ui.cursorline.secondary" = {}
"ui.cursorcolumn.primary" = { bg = "selection" }
"ui.cursorcolumn.secondary" = {}

# Gutter & Line Numbers
"ui.gutter" = {}
"ui.gutter.selected" = {}
"ui.linenr" = { fg = "gutter_fg" }
"ui.linenr.selected" = { fg = "indigo_haze", modifiers = ["bold"] }

# Statusline — keep opaque for readability
"ui.statusline" = { fg = "fg_dimmed", bg = "bg_dark" }
"ui.statusline.inactive" = { fg = "gutter_fg", bg = "bg_dark" }
"ui.statusline.normal" = { fg = "bg_dark", bg = "lantern_amber", modifiers = ["bold"] }
"ui.statusline.insert" = { fg = "bg_dark", bg = "plasma_blue", modifiers = ["bold"] }
"ui.statusline.select" = { fg = "bg_dark", bg = "rust_glow", modifiers = ["bold"] }

# Bufferline — keep opaque
"ui.bufferline" = { fg = "indigo_haze", bg = "bg_dark" }
"ui.bufferline.active" = { fg = "bg_dark", bg = "lantern_amber", modifiers = ["bold"] }
"ui.bufferline.background" = { bg = "bg_dark" }

# Popup & Menus — keep opaque so text is always readable
"ui.popup" = { fg = "dusty_white", bg = "bg_dark" }
"ui.popup.info" = { fg = "dusty_white", bg = "bg_dark" }
"ui.menu" = { fg = "dusty_white", bg = "bg_dark" }
"ui.menu.selected" = { fg = "bg_dark", bg = "plasma_blue", modifiers = ["bold"] }
"ui.menu.scroll" = { fg = "fg_dimmed", bg = "border" }
"ui.help" = { fg = "dusty_white", bg = "bg_dark" }
"ui.window" = { fg = "border" }

# Virtual elements — no backgrounds
"ui.virtual.ruler" = { fg = "border" }
"ui.virtual.inlay-hint" = { fg = "gutter_fg" }
"ui.virtual.inlay-hint.parameter" = { fg = "gutter_fg", modifiers = ["italic"] }
"ui.virtual.inlay-hint.type" = { fg = "gutter_fg", modifiers = ["italic"] }

# Highlight
"ui.highlight" = { modifiers = ["bold"] }
"ui.highlight.frameline" = { underline = { color = "rust_glow", style = "line" } }

# Snippet
tabstop = { modifiers = ["italic", "underlined"] }

# ─── Palette ─────────────────────────────────────────────────────────────────

[palette]

# Opaque dark for UI elements that must stay readable
bg_dark = "#090810"
border = "#252338"
selection = "#2E2A48"
bg_highlight = "#1A1826"

# Foregrounds
dusty_white = "#D8D0E8"
fg_dimmed = "#7A7090"
indigo_haze = "#8B72BE"
gutter_fg = "#312B40"

# Accents
smoke_white = "#F2EEF8"
lantern_amber = "#E8922A"
neon_crimson = "#E8314A"
plasma_blue = "#52C8F0"
sign_yellow = "#F5C842"
rust_glow = "#C46B3A"
alley_mist = "#8FAABB"
alley_green = "#5EC465"
alarm_red = "#E83040"

# Secondary cursor
secondary_cursor = "#6B5A8A"
